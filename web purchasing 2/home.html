<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - FoodSync Enterprise</title>
    <!-- Google Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           RESET & GLOBAL STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #FFFFFF;
        }

        /* ==========================================
           PANEL KIRI (KONTEN TEKS & TOMBOL)
           ========================================== */
        .left-panel {
            flex: 0 0 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%;
            padding-right: 5%;
            position: relative;
            z-index: 10;
            background-color: #FFFFFF;
        }

        /* Branding Logo */
        .brand-logo {
            font-size: 68px;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -2.5px;
            line-height: 1;
            color: #003B7A;
        }
        .brand-subtext {
            font-size: 13px;
            font-weight: 800;
            color: #003B7A;
            letter-spacing: 0.5px;
            margin-top: 8px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Teks Headline */
        .hero-text {
            font-size: 24px;
            font-weight: 500;
            color: #000000;
            line-height: 1.4;
            margin-bottom: 48px;
        }

        /* Grup Tombol */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 220px;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.98);
        }

        /* Tombol Sign In (Gradasi Biru dengan Shadow Terang) */
        .btn-signin {
            background: linear-gradient(to right, #4FACFE 0%, #0078FF 100%);
            color: #FFFFFF;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 120, 255, 0.3);
        }

        /* Tombol Register (Outline Biru) */
        .btn-register {
            background: #FFFFFF;
            color: #003B7A;
            border: 2px solid #4FACFE;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* Teks Footer Kecil (Berada di tengah bawah layar) */
        .footer-text {
            position: absolute;
            bottom: 24px;
            left: 100%; /* Diletakkan di perbatasan layar kiri dan kanan */
            transform: translateX(-50%);
            font-size: 11px;
            color: #6B7280;
            font-weight: 500;
            z-index: 20;
            white-space: nowrap;
        }

        /* ==========================================
           PANEL KANAN (GAMBAR GEDUNG & EFEK FADING)
           ========================================== */
        .right-panel {
            flex: 1;
            position: relative;
            /* URL Gambar Gedung. Gunakan link gambar asli Anda jika sudah ada di folder lokal */
            background-image: url('Plaza_Sudirman-Marein_-_panoramio.jpg.jpeg'); 
            background-size: cover;
            background-position: center left;
        }

        /* Efek Gradasi Putih agar menyatu sangat halus dengan sisi kiri */
        .right-panel::before {
            content: '';
            position: absolute;
            top: 0; 
            left: 0; 
            bottom: 0; 
            width: 60%;
            background: linear-gradient(to right, rgba(255,255,255,1) 0%, rgba(255,255,255,0.7) 30%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Sisi Kiri: Teks dan Tombol -->
    <div class="left-panel">
        <div>
            <div class="brand-logo">FoodSync</div>
            <div class="brand-subtext">The System of Integrated Food ERP</div>
        </div>
        
        <div class="hero-text">
            Integrated Enterprise System Analysis<br>
            Optimizing Business Processes Through<br>
            Technology and Data Integration
        </div>
        
        <div class="btn-group">
            <!-- Diarahkan ke file login.html Anda yang sudah kita buat sebelumnya -->
            <a href="login.html" class="btn btn-signin">Sign In</a>
            <!-- Juga diarahkan ke halaman autentikasi (login.html) karena form register ada di sana -->
            <a href="login.html" class="btn btn-register">Register</a>
        </div>
        
        <div class="footer-text">Project Sistem Enterprise 4F @2026</div>
    </div>
    
    <!-- Sisi Kanan: Gambar Gedung Estetik -->
    <div class="right-panel"></div>

</body>
</html>
