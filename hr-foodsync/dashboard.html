    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem('originalRole') === 'SuperAdmin') {
                const widget = document.getElementById('headerSuperAdminWidget');
                const switcher = document.getElementById('headerRoleSwitcher');
                if(widget && switcher) {
                    widget.classList.remove('hidden');
                    widget.classList.add('flex');
                    switcher.value = localStorage.getItem('userRole') || 'SuperAdmin';
                    switcher.addEventListener('change', function(e) {
                        localStorage.setItem('userRole', e.target.value);
                        window.location.reload();
                    });
                }
            }
        });

        window.toggleDropdown = function(id) {
            const dropdown = document.getElementById(id);
            if(id !== 'settingsDropdown') { const sd = document.getElementById('settingsDropdown'); if (sd) sd.classList.add('hidden'); }
            if(id !== 'notifDropdown') { const nd = document.getElementById('notifDropdown'); if (nd) nd.classList.add('hidden'); }
            if(dropdown) dropdown.classList.toggle('hidden');
        }
        document.addEventListener('click', function(event) {
            const isClickInsideSettings = event.target.closest('#settingsDropdown') || event.target.closest('button[onclick="window.toggleDropdown(\'settingsDropdown\')"]');
            const isClickInsideNotif = event.target.closest('#notifDropdown') || event.target.closest('button[onclick="window.toggleDropdown(\'notifDropdown\')"]');
            if (!isClickInsideSettings) { const sd = document.getElementById('settingsDropdown'); if (sd) sd.classList.add('hidden'); }
            if (!isClickInsideNotif) { const nd = document.getElementById('notifDropdown'); if (nd) nd.classList.add('hidden'); }
        });

        // ========================================
        // TOAST NOTIFICATION SYSTEM
        // ========================================
        window.showToast = function(message, type) {
            type = type || 'success';
            const container = document.getElementById('toastContainer');
            const id = 'toast-' + Date.now();
            const cfg = {
                success: { bg: '#16a34a', icon: 'fa-circle-check' },
                error:   { bg: '#dc2626', icon: 'fa-circle-xmark' },
                info:    { bg: '#003B73', icon: 'fa-circle-info' },
                warning: { bg: '#d97706', icon: 'fa-triangle-exclamation' }
            };
            const c = cfg[type] || cfg.success;
            const el = document.createElement('div');
            el.id = id;
            el.className = 'pointer-events-auto px-5 py-3.5 rounded-2xl shadow-fly flex items-center gap-3 min-w-[280px] max-w-[380px] toast-enter';
            el.style.cssText = `background:${c.bg}; color:#fff;`;
            el.innerHTML = `<i class="fa-solid ${c.icon} text-lg shrink-0"></i><span style="font-size:13px;font-weight:600;flex:1;">${message}</span><button onclick="document.getElementById('${id}').remove()" style="opacity:.8;hover:opacity:1;background:none;border:none;cursor:pointer;color:#fff;"><i class="fa-solid fa-xmark"></i></button>`;
            container.appendChild(el);
            setTimeout(function() {
                el.classList.replace('toast-enter', 'toast-exit');
                setTimeout(function() { if(el.parentNode) el.remove(); }, 320);
            }, 4200);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBZwROiuKK7spW5EZXAnmaaRg1SXvcQSP8", authDomain: "modul-hr-c889c.firebaseapp.com", projectId: "modul-hr-c889c", storageBucket: "modul-hr-c889c.firebasestorage.app", messagingSenderId: "422365405521", appId: "1:422365405521:web:79e314f0c8b54161dc3370" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let chartInstances = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const currentRole = localStorage.getItem('userRole');
                if (!currentRole) { window.location.replace("index.html"); return; }
                
                const rawName = user.email.split('@')[0];
                const namaKapital = rawName.charAt(0).toUpperCase() + rawName.slice(1);
                
                document.getElementById('userDisplayName').innerText = namaKapital;
                document.getElementById('userDisplayRole').innerText = currentRole;
                document.getElementById('userInitial').innerText = namaKapital.charAt(0);

                await bangunDashboard(currentRole, namaKapital, user.email);
            } else { window.location.replace("index.html"); }
        });

        window.prosesLogout = function() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('originalRole');
            signOut(auth).then(() => { window.location.replace("index.html"); });
        };

        // ========================================
        // HELPER UTILITIES
        // ========================================
        function fRupiah(n) { return 'Rp ' + new Intl.NumberFormat('id-ID').format(Number(n) || 0); }
        
        function fTanggal(ts) {
            if (!ts) return '-';
            const d = new Date(ts);
            if (isNaN(d)) return '-';
            const b = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
            return `${d.getDate()} ${b[d.getMonth()]} ${d.getFullYear()}`;
        }

        function badgeStatus(s) {
            const m = {
                'DIPROSES':  'background:#fffbeb;color:#d97706;border:1px solid #fcd34d;',
                'MENUNGGU':  'background:#fffbeb;color:#d97706;border:1px solid #fcd34d;',
                'DISETUJUI': 'background:#f0fdf4;color:#16a34a;border:1px solid #86efac;',
                'DITOLAK':   'background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;',
            };
            const label = { 'DIPROSES':'Menunggu','MENUNGGU':'Menunggu','DISETUJUI':'Disetujui','DITOLAK':'Ditolak' };
            const style = m[s] || 'background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;';
            return `<span style="${style}padding:2px 10px;border-radius:8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;">${label[s]||s}</span>`;
        }

        // ========================================
        // DASHBOARD BUILDER
        // ========================================
        async function bangunDashboard(role, nama, email) {
            const container = document.getElementById('dynamicDashboardContainer');
            chartInstances.forEach(c => c.destroy());
            chartInstances = [];

            const today = new Date().toISOString().split('T')[0];
            const now = new Date();
            const BLN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            const periode = `${BLN[now.getMonth()]} ${now.getFullYear()}`;

            // ============================================================
            // SUPER ADMIN
            // ============================================================
            if (role === 'SuperAdmin') {
                let totalKaryawan = 0, hadirHariIni = 0, cutiPending = 0, reimbPending = 0;
                let deptCounts = {};

                try {
                    const [sK, sA, sC, sR] = await Promise.all([
                        getDocs(collection(db, "karyawan")),
                        getDocs(query(collection(db, "absensi"), where("dateKey", "==", today))),
                        getDocs(query(collection(db, "cuti"), where("status", "==", "DIPROSES"))),
                        getDocs(query(collection(db, "reimbursement"), where("status", "==", "MENUNGGU")))
                    ]);
                    totalKaryawan = sK.size; hadirHariIni = sA.size;
                    cutiPending = sC.size; reimbPending = sR.size;
                    sK.forEach(d => { const dep = d.data().departemen || 'Lainnya'; deptCounts[dep] = (deptCounts[dep] || 0) + 1; });
                } catch(e) { console.error(e); }

                const hadir = hadirHariIni, belumHadir = Math.max(0, totalKaryawan - hadir);
                const pctHadir = totalKaryawan > 0 ? Math.round((hadir / totalKaryawan) * 100) : 0;
                const dptL = Object.keys(deptCounts), dptD = Object.values(deptCounts);

                container.innerHTML = `
                    <div>
                        <h1 class="text-[24px] font-black text-brand-navy tracking-tight">Selamat datang, ${nama}! 👋</h1>
                        <p class="text-[13px] text-gray-400 font-medium mt-0.5">Ringkasan operasional FoodSync HRMS — ${periode}</p>
                    </div>

                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">

                                </div>
                                <span style="font-size:10px;font-weight:800;color:#2563eb;background:#eff6ff;padding:3px 8px;border-radius:8px;">AKTIF</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${totalKaryawan}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Total Karyawan</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-green-50 flex items-center justify-center">
                                    <i class="fa-solid fa-user-shield text-green-500 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#16a34a;background:#f0fdf4;padding:3px 8px;border-radius:8px;">${pctHadir}%</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${hadirHariIni}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Hadir Hari Ini</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-amber-50 flex items-center justify-center">
                                    <i class="fa-solid fa-calendar-clock text-amber-500 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#d97706;background:#fffbeb;padding:3px 8px;border-radius:8px;">PENDING</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${cutiPending}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Pengajuan Cuti</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">

                                <div class="w-11 h-11 rounded-xl bg-purple-50 flex items-center justify-center">

                                </div>
                                <span style="font-size:10px;font-weight:800;color:#9333ea;background:#faf5ff;padding:3px 8px;border-radius:8px;">REVIEW</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${reimbPending}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Reimburse Pending</p>
                        </div>

                    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
                        <div class="lg:col-span-3 bg-white rounded-2xl border border-gray-100 p-6 shadow-soft">
                            <div class="mb-5">

                                ${reimbPending > 0 ? `<span class="w-6 h-6 rounded-full flex items-center justify-center text-white text-[10px] font-black" style="background:#ef4444;">${reimbPending}</span>` : `<span style="font-size:10px;font-weight:800;color:#16a34a;background:#f0fdf4;padding:3px 8px;border-radius:8px;">CLEAR</span>`}
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${reimbPending}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Pending Reimburse</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-green-50 flex items-center justify-center">
                                    <i class="fa-solid fa-circle-check text-green-500 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#16a34a;background:#f0fdf4;padding:3px 8px;border-radius:8px;">ALL TIME</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${totalDisetujui}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Total Disetujui</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-red-50 flex items-center justify-center">
                                    <i class="fa-solid fa-circle-xmark text-red-400 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#ef4444;background:#fef2f2;padding:3px 8px;border-radius:8px;">ALL TIME</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${totalDitolak}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Total Ditolak</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-soft">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-[14px] font-black text-gray-800">Antrean Cuti <span class="ml-2 px-2 py-0.5 rounded-lg text-[11px] font-extrabold" style="background:#fffbeb;color:#d97706;">${cutiPending}</span></h3>
                                <a href="supervisor.html" class="text-[12px] font-bold text-brand-light hover:underline">Proses semua →</a>
                            </div>
                            ${cutiHTML}
                        </div>
                        <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-soft">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-[14px] font-black text-gray-800">Antrean Reimburse <span class="ml-2 px-2 py-0.5 rounded-lg text-[11px] font-extrabold" style="background:#fff7ed;color:#ea580c;">${reimbPending}</span></h3>
                                <a href="supervisor.html" class="text-[12px] font-bold text-brand-light hover:underline">Proses semua →</a>
                            </div>
                            ${reimbHTML}
                        </div>
                    </div>

                    <div class="rounded-2xl p-6 text-white flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shadow-soft" style="background:linear-gradient(135deg,#7c2d12,#ea580c);">
                        <div>
                            <p style="font-size:11px;font-weight:800;color:#fed7aa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Action Required</p>
                            <p class="text-[18px] font-black">${totalPending} Item Menunggu Persetujuan Anda</p>
                            <p style="font-size:13px;color:#fde8d8;margin-top:4px;">Tinjau dan berikan keputusan di halaman Supervisor.</p>
                        </div>
                        <a href="supervisor.html" class="bg-white text-orange-700 px-6 py-3 rounded-xl font-black text-[13px] hover:bg-gray-100 transition shrink-0 shadow-md">
                            <i class="fa-solid fa-list-check mr-2"></i> Buka Approval
                        </a>
                    </div>
                `;
            }

            // ============================================================
            // PAYROLL
            // ============================================================
            else if (role === 'Payroll') {
                let totalKaryawan = 0, totalDisetujui = 0, totalDana = 0, reimbPending = 0;
                let listDisetujui = [], mapNama = {};

                try {
                    const [sK, sRa, sRp] = await Promise.all([
                        getDocs(collection(db, "karyawan")),
                        getDocs(query(collection(db, "reimbursement"), where("status", "==", "DISETUJUI"))),
                        getDocs(query(collection(db, "reimbursement"), where("status", "==", "MENUNGGU")))
                    ]);
                    sK.forEach(d => { totalKaryawan++; if(d.data().email) mapNama[d.data().email] = d.data().nama; });
                    totalDisetujui = sRa.size; reimbPending = sRp.size;
                    sRa.forEach(d => { totalDana += Number(d.data().nominal) || 0; listDisetujui.push(d.data()); });
                    listDisetujui.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                } catch(e) { console.error(e); }

                const previewList = listDisetujui.slice(0, 5);
                const payTableHTML = previewList.length
                    ? previewList.map(r => {
                        const n = mapNama[r.email] || r.email.split('@')[0];
                        return `<div class="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-xl flex items-center justify-center text-[11px] font-black" style="background:#f0fdf4;color:#16a34a;">${n.charAt(0).toUpperCase()}</div>
                                <div><p class="text-[13px] font-bold text-gray-800">${n}</p><p class="text-[11px] text-gray-400">${r.kategori}</p></div>
                            </div>
                            <div class="text-right">
                                <p class="text-[13px] font-extrabold text-gray-900">${fRupiah(r.nominal)}</p>
                                <span style="background:#f0fdf4;color:#16a34a;border:1px solid #86efac;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:800;text-transform:uppercase;">Siap Cair</span>
                            </div>
                        </div>`;
                    }).join('')
                    : `<div class="py-6 text-center"><i class="fa-solid fa-inbox text-3xl text-gray-200 block mb-2"></i><p class="text-[12px] text-gray-400">Belum ada reimburse disetujui</p></div>`;

                container.innerHTML = `
                    <div>
                        <h1 class="text-[24px] font-black text-brand-navy tracking-tight">Payroll &amp; Finance Dashboard</h1>
                        <p class="text-[13px] text-gray-400 font-medium mt-0.5">Rekap penggajian dan pengeluaran — ${periode}</p>
                    </div>

                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-blue-50 flex items-center justify-center">
                                    <i class="fa-solid fa-users text-blue-600 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#2563eb;background:#eff6ff;padding:3px 8px;border-radius:8px;">AKTIF</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${totalKaryawan}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Total Karyawan</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-emerald-50 flex items-center justify-center">
                                    <i class="fa-solid fa-file-invoice-dollar text-emerald-500 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#10b981;background:#f0fdf4;padding:3px 8px;border-radius:8px;">APPROVED</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${totalDisetujui}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Reimburse Disetujui</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-green-50 flex items-center justify-center">
                                    <i class="fa-solid fa-wallet text-green-600 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#16a34a;background:#f0fdf4;padding:3px 8px;border-radius:8px;">DANA</span>
                            </div>
                            <p class="text-[16px] font-black text-gray-900 leading-none mb-1">${fRupiah(totalDana)}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Total Dana Reimburse</p>
                        </div>
                        <div class="stat-card bg-white rounded-2xl border border-gray-100 p-5 shadow-soft">
                            <div class="flex items-center justify-between mb-4">
                                <div class="w-11 h-11 rounded-xl bg-amber-50 flex items-center justify-center">
                                    <i class="fa-solid fa-hourglass-half text-amber-500 text-lg"></i>
                                </div>
                                <span style="font-size:10px;font-weight:800;color:#d97706;background:#fffbeb;padding:3px 8px;border-radius:8px;">REVIEW</span>
                            </div>
                            <p class="text-[32px] font-black text-gray-900 leading-none mb-1">${reimbPending}</p>
                            <p class="text-[12px] font-semibold text-gray-400">Menunggu Approval</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 bg-white rounded-2xl border border-gray-100 p-6 shadow-soft">
                            <div class="flex justify-between items-center mb-5">
                                <h3 class="text-[14px] font-black text-gray-800">Reimburse Siap Dicairkan</h3>
                                <a href="payroll.html" class="text-[12px] font-bold text-brand-light hover:underline">Lihat semua →</a>
                            </div>
                            ${payTableHTML}
                        </div>

                        <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-soft flex flex-col justify-between">
                            <div>
                                <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-4">Ringkasan Periode</p>
                                <div class="flex items-center gap-3 mb-5">
                                    <div class="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" style="background:#f0fdf4;">
                                        <i class="fa-solid fa-circle-check text-emerald-500 text-xl"></i>
                                    </div>
                                    <div>
                                        <p class="text-[15px] font-black text-gray-900">Dalam Proses</p>
                                        <p class="text-[11px] text-gray-400">${periode}</p>
                                    </div>
                                </div>
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center py-2 border-b border-gray-50">
                                        <span class="text-[12px] text-gray-500 font-semibold">Total Karyawan</span>
                                        <span class="text-[12px] font-black text-gray-900">${totalKaryawan} orang</span>
                                    </div>
                                    <div class="flex justify-between items-center py-2 border-b border-gray-50">
                                        <span class="text-[12px] text-gray-500 font-semibold">Berkas Cair</span>
                                        <span class="text-[12px] font-black text-gray-900">${totalDisetujui} berkas</span>
                                    </div>
                                    <div class="flex justify-between items-center py-2 border-b border-gray-50">
                                        <span class="text-[12px] text-gray-500 font-semibold">Menunggu Review</span>
                                        <span class="text-[12px] font-black text-amber-600">${reimbPending} berkas</span>
                                    </div>
                                    <div class="flex justify-between items-center py-2">
                                        <span class="text-[13px] text-gray-700 font-black">Total Dana</span>
                                        <span class="text-[13px] font-black text-emerald-600">${fRupiah(totalDana)}</span>
                                    </div>
                                </div>
                            </div>
                            <a href="payroll.html" class="mt-5 w-full block text-center py-2.5 rounded-xl text-[12px] font-extrabold hover:opacity-90 transition" style="background:#003B73;color:#fff;">
                                <i class="fa-solid fa-file-invoice-dollar mr-2"></i> Buka Payroll
                            </a>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
