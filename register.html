<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - PT Indofood</title>
    <style>
        /* --- 1. Variables & Global Reset --- */
        :root {
            --color-primary-dark: #003E7B;
            --color-primary-blue: #0071E1;
            --color-accent-light: #81C0FF;
            --color-text-black: #000000;
            --color-text-dark: #1A1A1A;
            --color-placeholder: rgba(0, 62, 123, 0.33);
            --color-white: #FFFFFF;
            --font-main: 'SF Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(134deg, var(--color-primary-dark) 0%, var(--color-primary-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- 2. Main Layout (Floating Card yang Dinormalkan) --- */
        .main-card {
            width: 85%;
            max-width: 1000px; 
            height: 85vh;
            max-height: 580px; 
            background: var(--color-white);
            border-radius: 40px; 
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        /* --- 3. Panel Kiri (Welcome Info & Glassmorphism) --- */
        .left-panel {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1000') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .glass-container {
            width: 80%;
            padding: 40px 20px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .heading-secondary { color: var(--color-white); font-size: 32px; font-weight: 860; line-height: 1.2; margin-bottom: 10px; }
        .subtitle-secondary { color: var(--color-white); font-size: 14px; font-weight: 510; margin-bottom: 30px; }
        .text-prompt { color: var(--color-accent-light); font-size: 14px; font-weight: 510; margin-bottom: 15px; }
        
        .btn-signin { 
            padding: 10px 40px; 
            background: var(--color-primary-blue); 
            color: var(--color-white); 
            border: none; 
            border-radius: 30px; 
            font-size: 16px; 
            font-weight: 860; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        .btn-signin:hover { opacity: 0.9; }

        /* --- 4. Panel Kanan (Form Register) --- */
        .right-panel {
            flex: 1.3;
            padding: 30px 50px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .heading-primary { color: var(--color-primary-dark); font-size: 40px; font-weight: 860; margin-bottom: 5px; text-align: center; }
        .subtitle-primary { color: var(--color-primary-dark); font-size: 16px; font-weight: 510; margin-bottom: 25px; text-align: center; }

        .form-row { display: flex; gap: 15px; }
        .form-group { margin-bottom: 15px; flex: 1; }

        .form-label { display: block; color: var(--color-text-black); font-size: 14px; font-weight: 510; margin-bottom: 6px; }

        .form-input {
            width: 100%;
            height: 45px; 
            border-radius: 12px;
            border: 2px solid var(--color-primary-blue);
            padding: 0 15px;
            font-size: 14px;
            font-family: var(--font-main);
            color: var(--color-primary-dark);
            outline: none;
        }
        .form-input::placeholder { color: var(--color-placeholder); }

        .controls-group { display: flex; align-items: center; margin: 5px 0 20px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; color: var(--color-text-dark); font-size: 13px; font-weight: 510; cursor: pointer; }
        .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

        .btn-signup {
            width: 100%;
            height: 50px; 
            background: var(--color-primary-dark);
            color: var(--color-white);
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-signup:hover { opacity: 0.9; }

        /* Responsivitas untuk layar lebih kecil */
        @media (max-width: 768px) {
            .main-card { flex-direction: column; height: auto; max-height: none; border-radius: 20px; overflow-y: auto; }
            .left-panel { padding: 40px 0; }
            .right-panel { padding: 30px; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="left-panel">
            <div class="glass-container">
                <h2 class="heading-secondary">Welcome To<br/>PT Indofood</h2>
                <p class="subtitle-secondary">We hope you had a great day</p>
                
                <p class="text-prompt">Have an account?</p>
                <button type="button" class="btn-signin" onclick="window.location.href='index.html'">Sign In</button>
            </div>
        </div>

        <div class="right-panel">
            <h1 class="heading-primary">Create Account</h1>
            <p class="subtitle-primary">Please enter your details</p>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" placeholder="E.g. Nara" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" placeholder="E.g. Nala" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" placeholder="E.g. nayla.mardhiyah24@mhs.uinjkt.ac.id" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="E.g. nayla.mardhiyah24" required>
                </div>

                <div class="controls-group">
                    <label class="checkbox-label">
                        <input type="checkbox" checked>
                        Remember log in activity
                    </label>
                </div>

                <button type="submit" class="btn-signup">Sign Up</button>
            </form>
        </div>
    </div>

    <script>
        // Logika sederhana saat tombol Sign Up ditekan
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman
            alert('Pendaftaran Berhasil! Mengarahkan ke halaman login...');
            window.location.href = 'index.html'; // Pindah ke halaman login
        });
    </script>
    <script src="register.js"></script>
</body>
</html>
